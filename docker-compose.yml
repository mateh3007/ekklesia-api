services:
  postgres:
    image: postgres:16-alpine
    container_name: ekklesia_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ekklesia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ekklesia123}
      POSTGRES_DB: ${POSTGRES_DB:-ekklesia_db}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ekklesia_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ekklesia}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ekklesia_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ekklesia.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ekklesia_network

volumes:
  postgres_data:

networks:
  ekklesia_network:
    driver: bridge
